{% extends "layout.html" %}

{% block body %}

<form action="/" method="post">
    <input type="text" name="length" autofocus autocomplete="off" placeholder="Length">
    <input type="submit" text="Generate">
</form>

{% if password %}
    <h3>Generated Password:</h3>
    <p><strong>{{ password }}</strong></p>
    <p>Length: {{ length }}</p>
{% endif %}

{% if error %}
    <p style="color: red;">{{ error }}</p>
{% endif %}

{% endblock %}

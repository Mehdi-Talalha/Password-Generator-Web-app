{% extends "layout.html" %}

{% block body %}

<form action="/" method="post">
    <!-- rnage division -->
    <div class="length-ranger-container">
        <div class="label-side">
            <label for="length">
                <span class="header_sub-header">Password Length {{ length }} </span>
                  <input type="range" min="8" max="50" value="length" step="1" name="length">
            </label>
        </div>
    </div>

    <div class="checkbox-group">
        <!-- labels section -->
    <label class="checkbox-option">
        <input type="checkbox" name="characters" value="alpha">
        <span class="checkbox-custom"></span>
        <span class="checkbox-label">Abc</span>
    </label>

    <label class="checkbox-option">
        <input type="checkbox" name="characters" value="digits">
        <span class="checkbox-custom"></span>
        <span class="checkbox-label">123</span>
    </label>

    <label class="checkbox-option">
        <input type="checkbox" name="characters" value="punctuation">
        <span class="checkbox-custom"></span>
        <span class="checkbox-label">!@#</span>
    </label>
    </div>
    <input type="submit" value="Generate">
</form>

{% if password %}
    <div class="password-result">
        <h3>Generated Password:</h3>
        <p><strong>{{ password }}</strong></p>
        <p>Length: {{ length }}</p>
    </div>
{% endif %}

{% if error %}
    <div class="error-message">
        {{ error }}
    </div>
{% endif %}

{% endblock %}
